<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B3D91">
<meta name="description" content="Thrivelink Health - Cross-facility patient medical record system">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Thrivelink">
<title>Install Thrivelink Health</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="72x72" href="icons/icon-72x72.png">
<link rel="icon" type="image/png" sizes="96x96" href="icons/icon-96x96.png">
<link rel="icon" type="image/png" sizes="128x128" href="icons/icon-128x128.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="72x72" href="icons/icon-72x72.png">
<link rel="apple-touch-icon" sizes="96x96" href="icons/icon-96x96.png">
<link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128x128.png">
<link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144x144.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192x192.png">
<link rel="apple-touch-icon" sizes="384x384" href="icons/icon-384x384.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512x512.png">
<style>
<body>

<div class="container">
  <div class="logo-container">
    <img src="icons/icon-192x192.png" alt="Thrivelink Health">
  </div>

  <h1>Thrivelink Health</h1>
  <p class="tagline">Connecting Health, Empowering Lives</p>

  <div class="install-card">
    <button class="install-btn" id="installBtn" onclick="installApp()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Install App
    </button>

    <a href="app.html" class="open-btn" id="openBtn" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
        <polyline points="15 3 21 3 21 9"/>
        <line x1="10" y1="14" x2="21" y2="3"/>
      </svg>
      Open App
    </a>

    <div class="ios-instructions" id="iosInstructions">
      <h3>Install on iPhone/iPad</h3>
      <ol>
        <li>Tap the <strong>Share</strong> button in Safari's toolbar</li>
        <li>Scroll down and tap <strong>Add to Home Screen</strong></li>
        <li>Tap <strong>Add</strong> in the top right</li>
      </ol>
    </div>
  </div>

  <div class="features">
    <h2>Why Install?</h2>
    <div class="feature-item">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div class="feature-text">
        <h3>Works Offline</h3>
        <p>Access your records even without internet</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg>
      </div>
      <div class="feature-text">
        <h3>Cross-Facility Records</h3>
        <p>Your medical history follows you everywhere</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <div class="feature-text">
        <h3>Emergency Search</h3>
        <p>Find nearest hospitals and doctors instantly</p>
      </div>
    </div>
    <div class="feature-item">
      <div class="feature-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <div class="feature-text">
        <h3>Secure & Private</h3>
        <p>OTP verification and encrypted data</p>
      </div>
    </div>
  </div>
</div>

<div class="footer">
  Thrivelink Health Limited &copy; 2026
</div>

<script>
let deferredPrompt = null;
const installBtn = document.getElementById('installBtn');
const openBtn = document.getElementById('openBtn');
const iosInstructions = document.getElementById('iosInstructions');

// Check if already installed (standalone mode)
if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
  installBtn.style.display = 'none';
  openBtn.style.display = 'flex';
}

// Detect iOS
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);

if (isIOS && isSafari) {
  installBtn.style.display = 'none';
  iosInstructions.style.display = 'block';
}

// Listen for beforeinstallprompt
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'flex';
});

// Check if app is installed
window.addEventListener('appinstalled', () => {
  installBtn.style.display = 'none';
  openBtn.style.display = 'flex';
  deferredPrompt = null;
});

async function installApp() {
  if (!deferredPrompt) {
    // If no prompt available, just open the app
    window.location.href = 'app.html';
    return;
  }

  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;

  if (outcome === 'accepted') {
    installBtn.style.display = 'none';
    openBtn.style.display = 'flex';
  }

  deferredPrompt = null;
}

// Register service worker for install page too
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('SW registered'))
    .catch(err => console.log('SW error:', err));
}
</script>

</body>
</html>
